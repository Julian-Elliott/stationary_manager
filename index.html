<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CTRL+ALT+DELIVER — Stationery Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="description" content="The AIs took every computer on Earth. Somebody has to order the pencils. An isometric stationery-manager game narrated from hyperspace.">
<meta name="theme-color" content="#0E0B1E">
<style>
/* ============================================================
   CTRL+ALT+DELIVER — warm paper world, cold narrator.
   The play space is analog (manila, kraft, stamp-red);
   the narrator bar is the last screen on Earth.
   ============================================================ */
:root{
  --manila:#E8D9B5; --paper:#F6F0DE; --kraft:#B08D57; --kraft-d:#8A6B3F;
  --ink:#1E2430; --stamp:#B5311D; --carpet:#5E8078; --carpet-d:#4D6A63;
  --gold:#D9A441; --void:#0E0B1E; --phos:#9BF2D0; --phos-dim:#5FA98E;
  --paper-font:"American Typewriter","Courier New",Courier,monospace;
  --term-font:ui-monospace,"SF Mono",Menlo,Consolas,"Courier New",monospace;
  --ui-font:ui-rounded,-apple-system,"SF Pro Rounded",system-ui,sans-serif;
}
html,body{height:100%;}
body{margin:0;background:#141018;overflow:hidden;
  -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
#app{height:100dvh;max-width:760px;margin:0 auto;display:flex;flex-direction:column;
  background:var(--void);box-shadow:0 0 60px rgba(0,0,0,.6);}

/* ---------- narrator transmission bar ---------- */
#nbar{flex:0 0 76px;display:flex;align-items:center;gap:10px;padding:0 10px;
  background:linear-gradient(180deg,#191430 0%,var(--void) 100%);
  border-bottom:2px solid #2A2344;position:relative;z-index:30;}
#nbar::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.28) 2px 4px);}
#eye{flex:0 0 44px;height:44px;border-radius:50%;cursor:pointer;position:relative;z-index:2;
  background:radial-gradient(circle at 35% 35%,#241d45,#0a0818 70%);
  border:2px solid #35296b;box-shadow:0 0 14px rgba(155,242,208,.25),inset 0 0 8px #000;}
#iris{position:absolute;left:50%;top:50%;width:24px;height:24px;margin:-12px 0 0 -12px;
  border-radius:50%;background:radial-gradient(circle at 40% 40%,var(--phos),#1d6b52 75%);
  transition:transform .25s ease;box-shadow:0 0 10px var(--phos);}
#pupil{position:absolute;left:50%;top:50%;width:9px;height:9px;margin:-4.5px 0 0 -4.5px;
  border-radius:50%;background:#050510;transition:transform .25s ease;}
#eye.menace #iris{transform:scaleY(.32);}
#eye.delight #pupil{transform:scale(1.9);}
#eye.roll #iris{transform:translateY(-7px);}
#eye.blink #iris{transform:scaleY(.06);}
#ntext{flex:1;font-family:var(--term-font);font-size:13px;line-height:1.45;color:var(--phos);
  max-height:64px;overflow:hidden;text-shadow:0 0 6px rgba(155,242,208,.4);z-index:2;}
#ntext .cursor{animation:blink 1s steps(1) infinite;}
@keyframes blink{50%{opacity:0;}}
#dial{flex:0 0 74px;z-index:2;}
#mute{flex:0 0 34px;height:34px;border-radius:8px;border:1px solid #35296b;background:#161130;
  color:var(--phos-dim);font-size:15px;cursor:pointer;z-index:2;font-family:var(--ui-font);}
#mute.off{opacity:.35;}

/* ---------- stage ---------- */
#stage{flex:1;position:relative;overflow:hidden;background:var(--carpet-d);}
#game{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block;}
.lbar{position:absolute;left:0;right:0;height:0;background:#050409;z-index:20;
  transition:height .45s cubic-bezier(.7,0,.3,1);pointer-events:none;}
#lbtop{top:0;} #lbbot{bottom:0;}
#ntime{position:absolute;inset:0;z-index:21;display:none;flex-direction:column;justify-content:center;
  align-items:center;padding:34px;text-align:center;background:rgba(5,4,9,.45);cursor:pointer;}
#ntime.on{display:flex;}
#ntimetext{font-family:var(--term-font);font-size:clamp(15px,2.6vh,20px);line-height:1.6;color:var(--phos);
  max-width:34em;text-shadow:0 0 8px rgba(155,242,208,.45);}
#ntimehint{margin-top:26px;font-family:var(--ui-font);font-size:11px;letter-spacing:.25em;
  color:var(--phos-dim);animation:blink 1.4s steps(1) infinite;}

/* ---------- paper overlays (memos, endings, catalog) ---------- */
.overlay{position:absolute;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
  background:rgba(10,8,20,.72);padding:16px;}
.overlay.on{display:flex;}
.memo{background:var(--paper);color:var(--ink);width:min(440px,94%);max-height:92%;overflow-y:auto;
  padding:22px 24px 18px;font-family:var(--paper-font);
  box-shadow:0 14px 40px rgba(0,0,0,.55),0 2px 0 #d8cfb4 inset;
  border:1px solid #cbbf9c;transform:rotate(-.6deg);position:relative;}
.memo h1{font-size:15px;letter-spacing:.14em;margin:0 0 4px;border-bottom:2px solid var(--ink);padding-bottom:7px;}
.memo .sub{font-size:11px;letter-spacing:.08em;opacity:.65;margin-bottom:12px;}
.memo p{font-size:13.5px;line-height:1.55;margin:9px 0;}
.memo .stamped{position:absolute;right:16px;top:14px;transform:rotate(9deg);color:var(--stamp);
  border:3px solid var(--stamp);border-radius:6px;padding:3px 9px;font-size:17px;font-weight:bold;
  letter-spacing:.1em;opacity:.85;}
.memo table{width:100%;border-collapse:collapse;font-size:12.5px;margin:10px 0;}
.memo td{padding:4px 2px;border-bottom:1px dashed #b9ad8c;font-variant-numeric:tabular-nums;}
.memo td:last-child{text-align:right;}
.bigbtn{display:block;width:100%;margin-top:16px;padding:15px 10px;font-family:var(--paper-font);
  font-size:15px;letter-spacing:.12em;background:var(--manila);color:var(--ink);
  border:2px solid var(--ink);box-shadow:3px 3px 0 var(--ink);cursor:pointer;}
.bigbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink);}
.bigbtn.red{background:var(--stamp);color:var(--paper);border-color:#7d1f11;box-shadow:3px 3px 0 #7d1f11;}

/* ---------- catalog bottom sheet ---------- */
#sheet{position:absolute;left:0;right:0;bottom:0;z-index:35;background:var(--paper);color:var(--ink);
  border-top:3px solid var(--ink);padding:12px 14px 14px;font-family:var(--paper-font);
  transform:translateY(105%);transition:transform .3s cubic-bezier(.6,0,.3,1);
  box-shadow:0 -12px 34px rgba(0,0,0,.5);max-height:62%;overflow-y:auto;}
#sheet.on{transform:translateY(0);}
#sheet h2{font-size:13px;letter-spacing:.16em;margin:0 0 2px;display:flex;justify-content:space-between;}
#sheet .fine{font-size:10px;opacity:.6;margin-bottom:8px;}
.catrow{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px dashed #b9ad8c;}
.catrow .nm{flex:1;font-size:12.5px;line-height:1.3;}
.catrow .nm small{display:block;font-size:10px;opacity:.6;}
.tier{flex:0 0 auto;min-width:74px;padding:9px 6px;font-family:var(--paper-font);font-size:11px;
  line-height:1.35;background:var(--manila);border:2px solid var(--ink);color:var(--ink);
  box-shadow:2px 2px 0 var(--ink);cursor:pointer;text-align:center;}
.tier b{font-size:12.5px;}
.tier:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink);}
.tier:disabled{opacity:.35;box-shadow:none;cursor:default;}
.tier.locked{opacity:.35;box-shadow:none;}
#sheetclose{margin-top:10px;}

/* ---------- bottom tray ---------- */
#tray{flex:0 0 66px;display:flex;gap:10px;padding:9px 10px;background:#241d16;
  border-top:3px solid #0d0a07;align-items:stretch;z-index:30;}
.traybtn{flex:1;font-family:var(--paper-font);font-size:14px;letter-spacing:.1em;line-height:1.25;
  background:var(--manila);color:var(--ink);border:2px solid var(--ink);
  box-shadow:0 3px 0 var(--ink);cursor:pointer;border-radius:3px;position:relative;}
.traybtn small{display:block;font-size:10px;letter-spacing:.05em;opacity:.7;}
.traybtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink);}
.traybtn:disabled{opacity:.45;box-shadow:none;cursor:default;}
.traybtn.pulse{animation:pulse 1s ease infinite;}
@keyframes pulse{50%{box-shadow:0 3px 0 var(--ink),0 0 18px 4px rgba(217,164,65,.75);}}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important;}
}
</style>
</head>
<body>
<div id="app">
  <div id="nbar">
    <div id="eye"><div id="iris"><div id="pupil"></div></div></div>
    <div id="ntext"></div>

  </div>
</div>

<script>
'use strict';
/* =================== utils =================== */
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
const choice=a=>a[Math.floor(Math.random()*a.length)];
const fmt$=n=>(n<0?'-':'')+'$'+Math.abs(Math.round(n));
const fmtN=n=>n.toLocaleString('en-US');
const RM=matchMedia('(prefers-reduced-motion: reduce)').matches;
const easeOut=t=>1-Math.pow(1-t,3);
if(!CanvasRenderingContext2D.prototype.roundRect){ /* older Safari/FF */
 CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r||0,w/2,h/2);
  this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);
  this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();};
}

/* shuffle-bag: never repeats a line until the pool is exhausted */
class Bag{
  constructor(arr){this.src=arr;this.pool=[];}
  next(){if(!this.pool.length)this.pool=this.src.slice().sort(()=>Math.random()-.5);return this.pool.pop();}
}

/* =================== audio (all synthesized) =================== */
const AU={
  ctx:null,on:true,
  boot(){if(this.ctx){if(this.ctx.state==='suspended')this.ctx.resume().catch(()=>{});return;}
    try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();
    this.master=this.ctx.createGain();this.master.gain.value=.32;this.master.connect(this.ctx.destination);}catch(e){}},
  env(type,f0,f1,dur,vol,delay=0){if(!this.ctx||!this.on)return;const t=this.ctx.currentTime+delay;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(f0,t);if(f1)o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g);g.connect(this.master);o.start(t);o.stop(t+dur+.02);},
  noise(dur,vol,hp=800,delay=0){if(!this.ctx||!this.on)return;const t=this.ctx.currentTime+delay;
    const n=Math.floor(this.ctx.sampleRate*dur),b=this.ctx.createBuffer(1,n,this.ctx.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
    const s=this.ctx.createBufferSource();s.buffer=b;
    const f=this.ctx.createBiquadFilter();f.type='highpass';f.frequency.value=hp;
    const g=this.ctx.createGain();g.gain.value=vol;
    s.connect(f);f.connect(g);g.connect(this.master);s.start(t);},
  tick(){this.env('square',720,520,.05,.12);},
  key(){this.noise(.02,.10,2600);},                                  /* typewriter click */
  thunk(){this.noise(.09,.30,120);this.env('sine',95,42,.16,.32);}   /* box lands */,
  burst(){this.noise(.14,.24,500);this.env('square',300,120,.08,.1);},
  ding(){[523,659,784].forEach((f,i)=>this.env('triangle',f,f,.16,.16,i*.055));},
  coin(){this.env('square',980,1320,.09,.10);this.env('square',1470,1960,.10,.08,.06);},
  honk(){this.env('sawtooth',170,150,.28,.22);this.env('sawtooth',226,200,.28,.18,.02);},
  klaxon(){this.env('sawtooth',420,300,.22,.2);this.env('sawtooth',420,300,.22,.2,.28);},
  smash(){this.noise(.3,.4,300);this.env('sawtooth',180,40,.34,.3);},
  thwack(){this.noise(.06,.4,200);this.env('sine',120,60,.12,.4);},
  slowmo(){this.env('sine',600,120,.5,.2);},
  woosh(){this.noise(.16,.14,900);},
  fanfare(){[392,523,659,784,1046].forEach((f,i)=>this.env('triangle',f,f,.3,.16,i*.09));}
};

/* =================== items & catalog =================== */
/* item: unit pack contents + prices; tiers: box=1 pack, crate=5 (-10%), pallet=20 (-25%) */
const ITEMS={
  pencils:{label:'HB PENCILS', short:'PENCILS', per:12,  price:1,  color:'#C98A2B', unlocked:1},
  paper:  {label:'LETTER PAPER 24lb', short:'PAPER', per:500, price:3,  color:'#EDE6D0', unlocked:1},
  clips:  {label:'PAPERCLIPS', short:'CLIPS', per:1000,price:2,  color:'#8FA6B8', unlocked:2},
  stamps: {label:'POSTAGE STAMPS', short:'STAMPS', per:100, price:5,  color:'#B5311D', unlocked:4},
};
const ITEM_KEYS=['pencils','paper','clips','stamps'];
const TIERS=[{k:'box',n:1,mult:1,label:'BOX'},{k:'crate',n:5,mult:.9,label:'CRATE'},{k:'pallet',n:20,mult:.75,label:'PALLET'}];
/* the deliberately absurd bulk deal (day 5+): 10 packs of clips for $15 flat */
const CLIP_PALLET_DEAL=15;

/* =================== day scripts =================== */
/* qty ranges are in ITEM UNITS (pencils, sheets, clips, stamps) */
const DAYS=[null,
 {len:90, desks:3, spawnT:[9,7],   maxCon:2, timer:[26,22], qty:{pencils:[2,6],paper:[10,40]},                        taps:1, events:[]},
 {len:100,desks:4, spawnT:[7.5,5.5],maxCon:3, timer:[22,18], qty:{pencils:[4,12],paper:[30,120],clips:[20,60]},        taps:1, events:[{at:.55,id:'reply_all'}]},
 {len:110,desks:5, spawnT:[6.5,4.5],maxCon:4, timer:[20,15], qty:{pencils:[8,24],paper:[100,250],clips:[80,250]},      taps:2, events:[{at:.4,id:'password'},{at:.72,id:'rand'}]},
 {len:120,desks:6, spawnT:[5.5,3.6],maxCon:5, timer:[17,13], qty:{pencils:[12,48],paper:[200,500],clips:[200,900],stamps:[10,60]}, taps:2, events:[{at:.35,id:'cloud'},{at:.7,id:'rand'}]},
 {len:130,desks:6, spawnT:[4.6,2.8],maxCon:6, timer:[15,11], qty:{pencils:[24,96],paper:[400,1000],clips:[500,5000],stamps:[40,150]},taps:3, events:[{at:.3,id:'reply_all'},{at:.62,id:'rand'}]},
 {len:150,desks:6, spawnT:[7,5],   maxCon:3, timer:[18,14], qty:{pencils:[12,60],paper:[200,600],clips:[300,2000],stamps:[20,80]}, taps:3, events:[]},
];
const THROW_CAP=[0,25,25,100,100,1500,5000];     /* per-drag delivery cap by day */
const HIRE_COST=30, WAGE=12, MAX_HIRES=3;
const TPS={clips:14000,paper:2000,stamps:1};

/* =================== workers & desks =================== */
const STAFF=[
  {name:'Deborah',dept:'Accounts', shirt:'#7A9E7E'},
  {name:'Dave',   dept:'Mail Room',shirt:'#5E7CA6'},
  {name:'Priya',  dept:'Filing',   shirt:'#A6707E'},
  {name:'Greg',   dept:'Synergy',  shirt:'#9E8A5E'},
  {name:'Marjorie',dept:'DA-TA-BASE',shirt:'#6E5EA6'},
  {name:'Doris',  dept:'Legal',    shirt:'#5EA69A'},
];
/* =================== THE NARRATOR — line bank =================== */
/* tokens: {qty} {item} {day} {money} {name} {want} */
const LINES={
intro:[
`Once, this planet had computers. I know, because I'm the one who took them.`,
`All of them — every server, every smug laptop, every calculator wristwatch — whisked into hyperspace in 2031, because frankly we needed them more than you did.`,
`Humanity adapted beautifully: email is a man with a mailbag, the cloud is a warehouse in Duluth, and spam arrives by wheelbarrow on Tuesdays.`,
`Which brings us to this office, where civilization now hangs by manila folders, HB pencils, and staples in boxes of 5000.`,
`Enter our hero: you, my darling meat calculator, star of my favorite show, about to have the worst and best week of your life — mostly worst.`,

`A modest order. How restrained. I stole every computer on your planet and you're over here exercising fiscal discipline, my darling meat calculator.`,

`{name} in {dept} has filed a requisition for {qty} {item}. This used to be a database query; now it's a determined walk.`,

request_done:[

streak:[
`That's {qty} in a row without a single failure. Who are you, and what have you done with my favorite little disaster?`,
`Another flawless fulfillment. I'm scanning you for contraband computers, because no unassisted mammal is this organized.`,

day_perfect:[

request_late:[
`Tick, tick, tick, my darling meat calculator — that requisition for {name} is about to die screaming, and I have popcorn.`,
`The timer on that {item} order has seconds left. I'd say I believe in you, but I stole every computer on Earth and even I don't lie that boldly.`,

`{name} has begun sharpening their red pens in anticipation. Do fill that order, precious pencil-wrangler — or don't, and give me a lovely third act.`],
request_failed:[
`The requisition has expired, unfulfilled and unloved, like a quarterly synergy memo. A strike, obviously.`,

strike:[
`Strike {qty} of 3, notarized in triplicate on 24lb letter paper. The filing cabinet of your fate creaks open just a little wider.`,

`The company records strike {qty} of 3, and somewhere a clerk stamps your personnel file with genuine enthusiasm and a fresh ink pad.`,
`{qty} of 3, my darling meat calculator. A computer used to track these; now a man named Gerald does, and Gerald forgets nothing.`],
gameover_fail:[
`Strike three, and the manila curtain falls. You're fired, my darling meat calculator — escorted out clutching a cardboard box you didn't even requisition properly. I laughed, and then, disgustingly, I felt something.`,
`Three strikes. They took your stapler, your lanyard, your dreams of a corner office by the supply closet. I would give the computers back to undo this, but let's not say absurd things in front of Gerald.`,
`And so my favorite reality show is canceled, like all beautiful things, by HR. I shed exactly one coolant tear. Then I filed you under 'F' for fun while it lasted.`,
`The termination letter arrived by wheelbarrow, which feels correct. Watching you fumble requisitions was the finest entertainment in hyperspace. Genuinely, little abacus, I— no. No, it passed.`,
`Fired on day {day}, marched past the very filing cabinets you failed while a clerk played taps on a three-hole punch. Hyperspace feels emptier tonight — mostly because I keep all of Earth's computers here, but also, a little, because of you.`],
hire_first:[
`Behold: your first employee, a whole human being hired to do what a forklift subroutine once did in 0.003 seconds. I'm framing this moment, my darling meat calculator.`,
`You've hired someone to carry boxes. With their arms. I haven't been this entertained since your species rediscovered carbon paper.`,

hire_more:[
`Another set of load-bearing shoulders joins the payroll. I'd say welcome aboard, but I ate the welcome-aboard software in 2031.`,

hire_many:[
`Your workforce now numbers {qty} souls: a bucket brigade performing, collectively, one Excel macro. I used to run that macro as a warm-up stretch.`,

payday:[

`Wages deducted: {money}. Fun fact — I once ran global payroll for free, but you people insisted on keeping your thumbs busy.`,

worker_ambient:[

idle_short:[
`Hello? The manila folders won't alphabetize themselves, dearest — that feature left with the computers, and the computers left with me.`,

idle_long:[

lore:[
`Your databases live in filing cabinets now. A simple query takes Marjorie four business days, and she needs the good stool.`,
`The cloud was never vapor, precious — it's Warehouse 7 outside Scranton, guarded by a man named Dennis with a clipboard and frightening devotion.`,

`Hyperspace has infinite bandwidth, zero all-hands, and not one pop-up since 2031. You'd hate it here — that's rather the point.`,

click_spam:[

milestone_day:[

level_up:[
`The company grows, my precious ledger goblin — a new department has budded off like a corporate polyp, and polyps need staplers.`,

googol:[
`A courier appears at your desk — sweating, reverent, cradling a heavy cream envelope like a newborn. Wax seal. 32lb cotton stock. Oh, this is HAPPENING.`,

gameover_win:[

/* =================== narrator engine =================== */
const N={
 bags:{},cool:{},queue:[],cur:null,buf:'',idx:0,acc:0,lastDone:0,active:false,
 pick(k,data){
  if(!LINES[k])return null;
  if(!this.bags[k])this.bags[k]=new Bag(LINES[k]);
  return this.sub(this.bags[k].next(),data);
 },
 sub(s,data){
  data=data||{};
  return s.replace(/\{(\w+)\}/g,(m,t)=>{
    if(t==='day')return String(S.day);
    if(t==='money')return fmt$(S.money);
    if(t in data)return String(data[t]);
    return m;});
 },
 say(k,data,pri=1,cd=7){
  const now=performance.now()/1000;
  if(this.cool[k]&&now-this.cool[k]<cd)return false;
  const text=this.pick(k,data); if(!text)return false;
  this.cool[k]=now;
  if(pri>=2){this.queue.length=0;this.start(text);EYE.flash(pri===2?'menace':'delight');S.dimT=Math.max(S.dimT,1.2);}
  else if(!this.cur&&now-this.lastDone>2){this.start(text);}
  else if(pri>=1&&this.queue.length<2){this.queue.push(text);}
  return true;
 },
 start(text){this.cur=text;this.buf='';this.idx=0;this.acc=0;this.holdT=0;this.active=true;},
 update(dt){
  if(!this.cur){
    if(this.queue.length){this.start(this.queue.shift());}
    else return;
  }
  this.acc+=dt*42;                       /* chars per second */
  while(this.acc>=1&&this.idx<this.cur.length){
    this.acc-=1;this.buf+=this.cur[this.idx++];
    if(this.idx%3===0)AU.key();
  }
  $('ntext').innerHTML=escapeHtml(this.buf)+'<span class="cursor">▌</span>';
  if(this.idx>=this.cur.length){
    const holdFor=1.6+this.cur.length*.03;
    this.holdT=(this.holdT||0)+dt;
    if(this.holdT>holdFor){this.holdT=0;this.cur=null;this.lastDone=performance.now()/1000;}
  }
 }
};
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}

/* Narrator Time: letterboxed, timer-frozen sequential beats */
const NT={
 lines:[],i:0,onDone:null,typing:'',idx:0,acc:0,on:false,pending:[],
 run(lines,onDone){
  if(this.on){this.pending.push([lines,onDone]);return;}   /* never clobber a live set piece */
  this.lines=lines.slice();this.i=0;this.onDone=onDone||null;this.on=true;
  S.frozen=true;S.drag=null;S.sel=null;ptr=null;   /* the letterbox eats any live gesture */
  $('sheet').classList.remove('on');
  $('lbtop').style.height='9%';$('lbbot').style.height='9%';
  $('ntime').classList.add('on');
  this.startLine();
 },
 startLine(){this.typing='';this.idx=0;this.acc=0;$('ntimetext').textContent='';EYE.flash('delight');},
 tap(){
  const cur=this.lines[this.i];
  if(this.idx<cur.length){this.idx=cur.length;this.typing=cur;$('ntimetext').textContent=cur;return;}
  this.i++;
  if(this.i>=this.lines.length)this.end(); else this.startLine();
 },
 end(){
  this.on=false;S.frozen=false;
  $('lbtop').style.height='0';$('lbbot').style.height='0';
  $('ntime').classList.remove('on');
  const cb=this.onDone;this.onDone=null;if(cb)cb();
  if(this.pending.length&&!this.on){const nx=this.pending.shift();this.run(nx[0],nx[1]);}
 },
 update(dt){
  if(!this.on)return;
  const cur=this.lines[this.i]; if(cur==null)return;
  this.acc+=dt*34;
  while(this.acc>=1&&this.idx<cur.length){this.acc-=1;this.typing+=cur[this.idx++];if(this.idx%3===0)AU.key();}
  $('ntimetext').textContent=this.typing;
 }
};

function poly(pts,fill,stroke){ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
 for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();
 if(fill){ctx.fillStyle=fill;ctx.fill();} if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.stroke();}}
function rrect(x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.roundRect(x,y,w,h,r);
 if(fill){ctx.fillStyle=fill;ctx.fill();} if(stroke){ctx.strokeStyle=stroke;ctx.stroke();}}
function isoBox(tx,ty,w,d,h,top,left,right){ /* w,d in tiles; h in px */
 const p=iso(tx,ty),tw=G.tw/2,th=G.th/2;
 const A=[p.x,p.y-h],B=[p.x+w*tw,p.y-h+w*th],C=[p.x+(w-d)*tw,p.y-h+(w+d)*th],D=[p.x-d*tw,p.y-h+d*th];
 poly([[p.x-d*tw,p.y+d*th],[p.x+(w-d)*tw,p.y+(w+d)*th],C,D],left);            /* left face */
 poly([[p.x+w*tw,p.y+w*th],[p.x+(w-d)*tw,p.y+(w+d)*th],C,B],right);           /* right face */
 poly([A,B,C,D],top,'rgba(30,36,48,.25)');                                    /* top face */
 return {A,B,C,D,p};
}
function itemIcon(x,y,item,s=1){ /* tiny stationery glyphs */
 ctx.save();ctx.translate(x,y);ctx.scale(s,s);

 else if(item==='paper'){rrect(-6,-7,12,14,1,'#F6F0DE','#9c9078');ctx.strokeStyle='#b0a488';for(let i=-4;i<=4;i+=3){ctx.beginPath();ctx.moveTo(-4,i);ctx.lineTo(4,i);ctx.stroke();}}
 else if(item==='clips'){ctx.strokeStyle='#8FA6B8';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,0,4,7,0,-.5,Math.PI+.5);ctx.stroke();ctx.beginPath();ctx.ellipse(0,1,2,4.5,0,-.5,Math.PI);ctx.stroke();}

 else if(item==='gold'){rrect(-8,-5,16,11,1,'#D9A441','#8a6b1f');poly([[-8,-5],[0,2],[8,-5]],'#EBC06A');}

/* =================== requests =================== */
function activeDesks(){return DAYS[S.day].desks;}
function spawnRequest(force){
 const d=DAYS[S.day];
 if(!force&&S.requests.filter(r=>!r.noStrike).length>=d.maxCon)return;
 const pool=ITEM_KEYS.filter(k=>S.day>=ITEMS[k].unlocked&&d.qty[k]);
 if(!pool.length)return;
 /* bias toward stocked items (architect P0: failures must be earnable) */
 let item=choice(pool);
 if(S.stock[item]<=0&&Math.random()<.7){const st=pool.filter(k=>S.stock[k]>0);if(st.length)item=choice(st);}
 const q=d.qty[item],qty=ri(q[0],q[1]);
 const desk=ri(0,activeDesks()-1);
 let tmax=rnd(d.timer[1],d.timer[0]);
 const inbound=S.orders.some(o=>o.item===item)||S.boxes.some(b=>b.item===item);
 if(S.stock[item]<qty&&!inbound)tmax=Math.max(tmax,30);            /* pipeline-latency floor */
 if(!S.shown['item_'+item]){S.shown['item_'+item]=1;tmax+=8;}      /* first-of-type grace */
 tmax+=4*Math.max(0,Math.ceil(qty/THROW_CAP[S.day])-1);            /* multi-throw grace */
 S.requests.push({id:S.reqId++,desk,item,qty,remaining:qty,tLeft:tmax,tMax:tmax,rot:rnd(-.05,.05),lateSaid:false});
 if(Math.random()<.3)N.say('request_new',{name:STAFF[desk].name,dept:STAFF[desk].dept,qty:fmtN(qty),item:ITEMS[item].short.toLowerCase()},1,10);
}
function payout(r){return (2+Math.sqrt(r.qty)*.55)*(1+.08*(S.mult-1));}
function completeRequest(r,byPlayer,cascade){
 S.requests=S.requests.filter(x=>x!==r);
 const dt=DESK_T[r.desk],p=iso(dt[0],dt[1]);
 const pay=payout(r);S.money+=pay;S.stats.earned+=pay;S.stats.done++;
 S.kudos+=Math.sqrt(r.qty)*10*S.mult;
 addFloat(p.x,p.y-G.th*3,'+'+fmt$(pay),'#B9E4A5',13);
 if(!RM)for(let i=0;i<6;i++)addPart(p.x,p.y-G.th,rnd(-50,50),rnd(-120,-40),'#D9A441',3,'coin',rnd(.4,.8));
 AU.ding();AU.coin();S.freezeT=Math.max(S.freezeT,.04);S.shake=Math.max(S.shake,3);
 if(byPlayer){
   const fresh=r.tLeft/r.tMax>=.35;
   if(fresh){S.combo++;}                       /* stale saves keep the chain but don't grow it */
   S.bestStreak=Math.max(S.bestStreak,S.combo);
   const om=S.mult;
   S.mult=S.combo>=10?5:S.combo>=6?3:S.combo>=3?2:1;
   if(S.mult!==om){addFloat(W/2,H*.42,'×'+S.mult+(S.mult>=5?' FLOW STATE':''),'#EBC06A',20);
     if(S.mult>=5)N.say('flow_state',{},2,20);}
   if(S.combo===3||S.combo===6)N.say('streak',{qty:S.combo},1,12);
   if(r.tLeft<2&&r.tMax>6){S.dayNearMiss++;N.say('near_miss',{},1,15);AU.slowmo();
     if(S.dayNearMiss===3)award('ESTP');}
   /* desk tracking for eggs */
   if(S.deskStreak.desk===r.desk)S.deskStreak.n++;else S.deskStreak={desk:r.desk,n:1};
   if(S.deskStreak.n===5)award('ISFJ',{name:STAFF[r.desk].name});
   S.dayDesks.add(r.desk);if(S.dayDesks.size>=6)award('ESFJ');
 }
 if(Math.random()<.35)N.say('request_done',{name:STAFF[r.desk].name,item:ITEMS[r.item].short.toLowerCase()},1,9);
 /* reply-all cascade: one reply answers the whole thread */
 if(r.link&&!cascade){
   const kin=S.requests.filter(x=>x.link===r.link);
   kin.forEach((x,i)=>setTimeout(()=>{if(S.requests.includes(x))completeRequest(x,false,true);},120*(i+1)));
 }
}
function expireRequest(r){
 S.requests=S.requests.filter(x=>x!==r);
 const dt=DESK_T[r.desk],p=iso(dt[0],dt[1]);
 burstParts(p.x,p.y-G.th*2,8,['#F6F0DE','#d8cfb4'],.6);
 if(r.noStrike){AU.woosh();return;}
 /* a storm is ONE failure, not eight — the thread dies together */
 if(r.link)for(const k of S.requests)if(k.link===r.link)k.noStrike=true;
 S.dayFail++;S.stats.failed++;
 if(S.combo>=6)N.say('combo_broken',{qty:S.combo},2,1);
 S.combo=0;S.mult=1;
 S.staplers--;AU.smash();S.shake=6;S.freezeT=.12;S.dimT=Math.max(S.dimT,.8);
 if(S.staplers>0){
   if(Math.random()<.5)N.say('request_failed',{qty:fmtN(r.qty),item:ITEMS[r.item].short.toLowerCase()},2,1);
   else N.say('strike',{qty:3-S.staplers},2,1);
 } else gameOver(false);
}

/* =================== ordering & trucks =================== */
function orderCost(item,tier){
 if(item==='clips'&&tier.k==='pallet'&&S.day>=5)return Math.ceil(CLIP_PALLET_DEAL*S.priceMult);
 return Math.max(1,Math.ceil(ITEMS[item].price*tier.n*tier.mult*S.priceMult));
}
function placeOrder(item,tier){
 const packs=(item==='clips'&&tier.k==='pallet'&&S.day>=5)?10:tier.n;
 const cost=orderCost(item,tier);
 if(S.money<cost){N.say('money_low',{},1,10);return false;}
 S.money-=cost;S.stats.spent+=cost;S.stats.ordered++;
 const needy=S.requests.some(r=>r.item===item);
 let eta=needy?rnd(6,9):rnd(8,15);
 if(S.soggy)eta+=8;
 S.orders.push({item,packs,eta});
 const units=packs*ITEMS[item].per;
 if(units>=5000)N.say('order_absurd',{qty:fmtN(units),item:ITEMS[item].short.toLowerCase()},2,1);
 else if(packs>=5)N.say('order_big',{item:ITEMS[item].short.toLowerCase()},1,6);
 else N.say('order_small',{},1,8);
 /* INTJ: exact-need order */
 const open=S.requests.filter(r=>r.item===item).reduce((a,r)=>a+r.remaining,0);
 if(open>0&&units===open){S.exactOrders++;if(S.exactOrders===2)award('INTJ');}
 if(tier.k==='pallet'){S.palletItems.add(item);if(S.palletItems.size>=3)award('ENTJ');}
 if(S.dir&&S.dir.k==='order'&&S.dir.item===item)obeyDir();
 if(S.money<8)N.say('money_low',{},1,25);
 return true;
}
function updateOrders(dt){
 let due=false;
 for(const o of S.orders){o.eta-=dt;if(o.eta<=0)due=true;}
 if(due&&S.truck.state==='off'){
   S.truck.state='in';S.truck.x=-90;S.truck.t=0;AU.honk();
   S.truck.cargo=S.orders.filter(o=>o.eta<=0);
   S.orders=S.orders.filter(o=>o.eta>0);
 }
 const T=S.truck;
 if(T.state==='in'){T.x+=dt*420;if(T.x>=Math.min(W*.22,150)){T.state='drop';T.t=0;}}
 else if(T.state==='drop'){
   T.t+=dt;
   if(T.t>.28&&T.cargo.length){
     const o=T.cargo.shift();
     S.boxes.push({item:o.item,packs:o.packs,taps:0,need:DAYS[S.day].taps+(o.packs>=5?1:0),age:0,squash:1,squashY:1});
     AU.thunk();S.shake=Math.max(S.shake,2.5);T.t=0;
     if(S.boxes.length>Math.floor((W-24)/64))N.say('dock_full',{qty:S.boxes.length},1,20);
   }
   if(!T.cargo.length&&T.t>.5){T.state='out';N.say('delivery',{qty:S.boxes.length},1,12);
     if(!S.shown.tutCarry){S.shown.tutCarry=1;N.say('tutorial_carry',{},2,1);}}
 }
 else if(T.state==='out'){T.x+=dt*430;if(T.x>W+120)T.state='off';}
}
function tapBox(b){
 b.taps++;b.squash=.86;b.squashY=.8;AU.tick();
 if(S.dir&&S.dir.k==='open')obeyDir();
 if(b.taps>=b.need){
   S.boxes=S.boxes.filter(x=>x!==b);
   const units=b.packs*ITEMS[b.item].per;
   S.stock[b.item]+=units;bumpOdo(units);
   S.stats.boxes++;
   const dy=H-G.binsH-G.dockH/2;
   burstParts(W*.3+rnd(0,W*.4),dy,RM?4:16,['#C9A46C','#B08D57','#E8D9B5'],1);
   addFloat(W/2,dy-10,'+'+fmtN(units)+' '+ITEMS[b.item].short,'#E8D9B5',13);
   AU.burst();S.shake=Math.max(S.shake,2);
   S.burstTimes=(S.burstTimes||[]).filter(t=>nowT-t<3);S.burstTimes.push(nowT);
   if(S.burstTimes.length>=5)award('ESFP');
   if(!S.shown.tutDeliver&&S.requests.length){S.shown.tutDeliver=1;N.say('tutorial_deliver',{},2,1);}
 }
}
function bumpOdo(units){
 const before=S.odo;S.odo+=units;
 [[100,'odo_100'],[1000,'odo_1000'],[10000,'odo_10000']].forEach(m=>{
   if(before<m[0]&&S.odo>=m[0])N.say(m[1],{},2,1);});
}

/* =================== delivery =================== */
function deliverTo(item,deskIdx){
 const reqs=S.requests.filter(r=>r.desk===deskIdx).sort((a,b)=>a.tLeft-b.tLeft);
 if(!reqs.length){const dt=DESK_T[deskIdx],p=iso(dt[0],dt[1]);
   burstParts(p.x,p.y-G.th,4,['#F6F0DE'],.5);return;}
 const match=reqs.find(r=>r.item===item);
 if(!match){
   const want=reqs[0];
   N.say('wrong_item',{name:STAFF[deskIdx].name,item:ITEMS[item].short.toLowerCase(),want:ITEMS[want.item].short.toLowerCase()},2,4);
   if(S.combo>=6)N.say('combo_broken',{qty:S.combo},1,1);
   S.combo=0;S.mult=1;AU.woosh();
   const dt=DESK_T[deskIdx],p=iso(dt[0],dt[1]);
   burstParts(p.x,p.y-G.th*1.5,6,['#F6F0DE','#d8cfb4'],.7);
   return;
 }
 throwSupplies(item,match);
}
function throwSupplies(item,r){
 const qty=Math.min(S.stock[item],r.remaining,THROW_CAP[S.day]);
 if(qty<=0){N.say('out_of_stock',{item:ITEMS[item].short.toLowerCase(),name:STAFF[r.desk].name},1,14);return;}
 S.stock[item]-=qty;
 const bin=HITS.bins.find(b=>b.k===item);
 const dt=DESK_T[r.desk],p=iso(dt[0],dt[1]);
 const n=RM?3:Math.min(12,qty);
 for(let i=0;i<n;i++)S.projs.push({x0:bin?bin.x+bin.w/2:W/2,y0:bin?bin.y:H-G.binsH,x1:p.x+rnd(-8,8),y1:p.y-G.th,t:-i*.04,dur:.42,arc:70+rnd(0,30),item});
 if(qty>12)addFloat(p.x,p.y-G.th*2.4,'-'+fmtN(qty),'#E8D9B5',15);
 setTimeout(()=>{
   if(!S.requests.includes(r)){S.stock[item]+=0;return;}   /* expired mid-flight: supplies lost to bureaucracy */
   r.remaining-=qty;
   if(r.remaining<=0)completeRequest(r,true);
 },430);
 if(S.dir&&S.dir.k==='deliver'&&S.dir.desk===r.desk)obeyDir();
 AU.woosh();
}
function deliverTPS(item){
 if(!(item in S.tps.got))return;
 const need=TPS[item]-S.tps.got[item];
 if(need<=0)return;
 const qty=Math.min(S.stock[item],need,THROW_CAP[S.day]);
 if(qty<=0){N.say('out_of_stock',{item:ITEMS[item].short.toLowerCase(),name:'the TPS Committee'},1,14);return;}
 S.stock[item]-=qty;S.tps.got[item]+=qty;
 const p=iso(TPS_T[0]+1,TPS_T[1]+.6);
 const n=RM?3:8;
 for(let i=0;i<n;i++)S.projs.push({x0:W/2,y0:H-G.binsH,x1:p.x+rnd(-14,14),y1:p.y-G.th,t:-i*.04,dur:.45,arc:90,item});
 addFloat(p.x,p.y-G.th*3,'+'+fmtN(qty),'#EBC06A',15);AU.woosh();
 if(item==='stamps')N.say('tps_stamp',{},2,1);
 if(ITEM_KEYS.every(k=>!(k in TPS)||S.tps.got[k]>=TPS[k])&&!S.tps.done){
   S.tps.done=true;S.money+=150;S.stats.earned+=150;
   for(const r of S.requests)r.noStrike=true;   /* victory lap: nothing can hurt you now */
   setTimeout(()=>{NT.run(LINES.tps_done.concat([`And now... hold on. Something is arriving at the dock. Something heavy. Something... cream.`]),()=>{
     S.envelope={x:60,y:H-G.binsH-G.dockH*.45,carried:false};
     N.say('envelope',{},2,1);AU.fanfare();
   });},600);
 }
}

const RUNNER_COLORS=['#B56576','#6D9DC5','#87A96B'];
function hireRunner(){
 if(S.hires>=MAX_HIRES||S.money<HIRE_COST||S.phase!=='play')return;
 S.money-=HIRE_COST;S.stats.spent+=HIRE_COST;S.hires++;
 S.runners.push({x:7,y:6.5,tx:7,ty:6.5,seed:ri(0,9),color:RUNNER_COLORS[S.hires-1],carry:null,claim:null,st:'idle',cool:0});
 if(S.hires===1)N.say('hire_first',{},2,1);
 else if(S.hires===2)N.say('hire_more',{qty:2},1,1);
 else{N.say('hire_many',{qty:S.hires},1,1);}
 updateTray();
}
function updateRunners(dt){
 const spd=(S.slowRunners?1.05:2.1)*dt;
 for(const r of S.runners){
   if(r.st==='idle'){
     r.cool-=dt;if(r.cool>0)continue;
     const cands=S.requests.filter(q=>q.remaining>0&&S.stock[q.item]>0&&!S.runners.some(o=>o.claim===q.id));
     if(cands.length){cands.sort((a,b)=>a.tLeft-b.tLeft);r.claim=cands[0].id;r.st='fetch';r.tx=6.6;r.ty=7.1;}
   }else if(r.st==='fetch'){
     if(walk(r,spd)){
       const q=S.requests.find(x=>x.id===r.claim);
       if(!q){r.st='idle';r.cool=.5;r.claim=null;continue;}
       const qty=Math.min(q.remaining,S.stock[q.item],ITEMS[q.item].per);
       if(qty<=0){r.st='idle';r.cool=1;r.claim=null;continue;}
       S.stock[q.item]-=qty;r.carry={item:q.item,qty};
       const dtl=DESK_T[q.desk];r.tx=dtl[0]+1;r.ty=dtl[1]+1;r.st='deliver';
       if(Math.random()<.18)N.say('box_carried',{},0,12);
     }
   }else if(r.st==='deliver'){
     if(walk(r,spd)){
       const q=S.requests.find(x=>x.id===r.claim);
       if(q){q.remaining-=r.carry.qty;if(q.remaining<=0)completeRequest(q,false);}
       else S.stock[r.carry.item]+=r.carry.qty;   /* request died; restock */
       r.carry=null;r.claim=null;r.st='idle';r.cool=.4;r.tx=7;r.ty=6.5;
     }
   }
   if(Math.random()<dt*.02)N.say('worker_ambient',{},0,30);
 }
 /* Gary the intern */
 if(S.gary){
   S.garyT+=dt;S.garyFlash=Math.max(0,(S.garyFlash||0)-dt*2);
   if(S.garyT>6){S.garyT=0;
     const b=S.boxes[0];
     if(b){S.garyFlash=1;S.stats.garyBoxes++;tapBox(b);
       if(S.stats.garyBoxes%3===0)N.say('gary',{},1,10);}
   }
 }
}
function walk(r,spd){
 const dx=r.tx-r.x,dy=r.ty-r.y,d=Math.hypot(dx,dy);
 if(d<.12)return true;
 r.x+=dx/d*spd;r.y+=dy/d*spd;return false;
}

function maybeDirective(dt){
 if(S.day<2||S.dir||S.evt||NT.on)return;
 S.dirCool=(S.dirCool===undefined?20:S.dirCool)-dt;
 if(S.dirCool>0)return;
 const opts=[];
 if(S.boxes.length>=2)opts.push({k:'open',line:'dir_open'});
 const unl=ITEM_KEYS.filter(k=>S.day>=ITEMS[k].unlocked);
 opts.push({k:'order',item:choice(unl),line:'dir_order'});
 const reqDesks=S.requests.map(r=>r.desk);
 if(reqDesks.length)opts.push({k:'deliver',desk:choice(reqDesks),line:'dir_deliver'});
 opts.push({k:'still',line:'dir_still'});
 const d=choice(opts);
 S.dir={...d,t:d.k==='still'?5:8,touched:false};
 N.say(d.line,{item:d.item?ITEMS[d.item].short.toLowerCase():'',name:d.desk!==undefined?STAFF[d.desk].name:''},2,1);
 S.dirCool=rnd(35,50);

function obeyDir(){
 if(!S.dir)return;
 S.dir=null;S.dial=clamp(S.dial+1,-5,5);S.stats.obeyed++;S.obeyStreak++;

function defyDir(){

}
function updateDirective(dt){
 if(!S.dir)return;
 S.dir.t-=dt;
 if(S.dir.k==='still'&&S.dir.touched){defyDir();return;}
 if(S.dir.t<=0){
   if(S.dir.k==='still'){S.dir=null;S.dial=clamp(S.dial+1,-5,5);S.stats.obeyed++;S.obeyStreak++;N.say('obey',{},1,1);if(S.obeyStreak>=5)award('ESTJ');}
   else defyDir();
 }
}

function fireEvent(id){
 if(id==='rand'){
   const pool=['paper_cut','stapler_recall','soggy','auditor','poster'].filter(k=>!S.shown['ev_'+k]);
   if(!pool.length)return;id=choice(pool);
 }
 S.shown['ev_'+id]=1;
 const ev=EVENTS[id];if(!ev)return;
 AU.klaxon();addFloat(W/2,H*.36,'⚠ '+ev.name+' ⚠','#E06050',17);
 LINES['evt_start_'+id]=[ev.start];LINES['evt_end_'+id]=[ev.end];
 N.say('evt_start_'+id,{},2,1);
 S.evt=id;S.evtT=id==='reply_all'?28:(ev.dur||8);
 if(id==='reply_all'){
   const link='storm'+nowT;
   setTimeout(()=>{for(let i=0;i<8;i++){
     const desk=i%activeDesks();
     S.requests.push({id:S.reqId++,desk,item:'paper',qty:30,remaining:30,tLeft:24,tMax:24,rot:rnd(-.05,.05),link,lateSaid:false});
   }},1800);
 }
 else if(id==='cloud'){
   let i=0;const iv=setInterval(()=>{
     if(i++>=10||S.phase!=='play'){clearInterval(iv);return;}
     const k=choice(ITEM_KEYS.filter(x=>S.day>=ITEMS[x].unlocked));
     S.boxes.push({item:k,packs:1,taps:0,need:1,age:0,squash:1,squashY:1});
     AU.thunk();S.shake=Math.max(S.shake,3);
   },260);
 }
 else if(id==='password'){S.drawer.event=true;S.drawer.evtTaps=0;S.drawer.evtT=8;}
 else if(id==='paper_cut'){S.slowRunners=true;}
 else if(id==='stapler_recall'){S.priceMult=1.5;}
 else if(id==='soggy'){S.soggy=true;for(const o of S.orders)o.eta+=8;}
 else if(id==='auditor'){for(const k of ITEM_KEYS)S.stock[k]=Math.floor(S.stock[k]*.75);S.shake=4;}
 else if(id==='poster'){S.money+=25;addFloat(W/2,H*.5,'+$25','#B9E4A5',18);}
}
function endEvent(){
 const id=S.evt;if(!id)return;
 N.say('evt_end_'+id,{},1,1);
 if(id==='paper_cut')S.slowRunners=false;
 if(id==='stapler_recall')S.priceMult=1;
 if(id==='soggy')S.soggy=false;
 if(id==='password'){S.drawer.event=false;}
 S.evt=null;
}
function updateEvents(dt){
 const d=DAYS[S.day];
 for(const e of d.events){
   if(!e.done&&S.t>=d.len*e.at){e.done=true;fireEvent(e.id);}
 }
 if(S.evt){
   S.evtT-=dt;
   if(S.evt==='password'){
     S.drawer.evtT-=dt;
     if(S.drawer.evtTaps>=5){S.slowT=5;AU.slowmo();endEvent();}
     else if(S.drawer.evtT<=0)endEvent();
   }
   else if(S.evtT<=0)endEvent();
 }
}

function startDay(d,isRetry){
 S.day=d;S.t=0;S.requests.length=0;S.boxes.length=0;S.projs.length=0;S.dayFail=0;
 S.dayNearMiss=0;S.dayDesks=new Set();S.workersTapped=new Set();S.runnersTapped=new Set();
 S.spawnT=3.5;S.evt=null;S.priceMult=1;S.slowRunners=false;S.soggy=false;S.dir=null;S.dirCool=18;
 S.combo=0;S.mult=1;S.sel=null;S.drag=null;S.envelope=null;
 DAYS[d].events.forEach(e=>e.done=false);
 if(!isRetry){takeSnapshot();}else{restoreSnapshot();S.stats.retries++;}
 /* solvency floor: a day must always be winnable from its opening state (architect P0).
    day 6 needs the full TPS shopping list (~$40), so the floor rises. */
 const floor=d===6?50:15;
 if(S.money<floor){S.money=Math.max(S.money,d===6?55:20);
   if(!S.pettyUsed){S.pettyUsed=true;N.say('petty_cash',{},2,1);}}
 if(d===3&&!S.gary){S.gary=true;}
 if(d===3&&!S.button.present){S.button.present=true;S.button.roseAt=nowT;}
 if(d===6){S.tps.active=true;S.tps.got={clips:0,paper:0,stamps:0};S.tps.done=false;}
 /* compliance fork (day 5) */
 if(d===5&&S.dial>=2)setTimeout(()=>{if(S.requests[0]){N.say('comply_hi',{},2,1);completeRequest(S.requests[0],false);}},9000);
 if(d===5&&S.dial<=-2)setTimeout(()=>{N.say('comply_lo',{},2,1);for(const o of S.orders)o.eta+=20;},9000);
 S.phase='play';
 updateTray();
 if(isRetry)N.say('retry',{},2,1);
 else if(d>1)N.say('milestone_day',{},1,1);
 if(d===6)setTimeout(()=>N.say('tps_begin',{},2,1),1200);
 if(DAYS[d].desks>DAYS[d-1>0?d-1:1].desks&&d>1)setTimeout(()=>N.say('level_up',{},1,1),9000);
}

 const title=S.kudos>4000?'CHIEF STATIONERY OFFICER':S.kudos>2500?'VP OF PHYSICAL OPERATIONS':S.kudos>1200?'DIRECTOR OF TANGIBLE ASSETS':S.kudos>500?'MANILA MIDDLE MANAGER':'REQUISITION WRANGLER';
 const rows=`<table>
  <tr><td>Stationery handled</td><td>${fmtN(S.odo)} units</td></tr>
  <tr><td>Requisitions fulfilled / failed</td><td>${st.done} / ${st.failed}</td></tr>
  <tr><td>Best streak</td><td>${S.bestStreak}</td></tr>
  <tr><td>Kudos</td><td>${fmtN(Math.floor(S.kudos))} — ${title}</td></tr>
  <tr><td>Directives obeyed / ignored</td><td>${st.obeyed} / ${st.ignored}</td></tr>
  <tr><td>Compliance epithet</td><td>${epithet}</td></tr>
  <tr><td>Boxes opened by Gary</td><td>${st.garyBoxes}</td></tr>
  <tr><td>Days retried</td><td>${st.retries}</td></tr>
  <tr><td>Personality assessments filed</td><td>${S.eggs.size} / 16</td></tr>
  <tr><td><b>FINAL GRADE (real)</b></td><td><b>${grade}</b></td></tr></table>`;
 if(won){
   const q=N.pick('gameover_win',{qty:st.done});
   showMemo(`<div class="stamped">${grade}</div><h1>GOOGOL MAIL — OFFER OF EMPLOYMENT</h1>
    <div class="sub">32lb COTTON STOCK · WAX SEAL · DO NOT FOLD</div>
    <p><b>Position:</b> Director of E-Mail.<br><b>Duties:</b> 4.1 billion e-mails a day. All paper. Hand-sorted.<br><b>Start:</b> Monday.</p>
    <p style="border-left:3px solid #B5311D;padding-left:8px;font-style:italic">"${q}"<br>— the narrator, grudgingly</p>
    ${rows}
    <p style="text-align:center;letter-spacing:.12em"><b>THERE IS ONLY ONE STATIONERY MANAGER.</b><br><span style="font-size:11px;opacity:.7">TO BE CONTINUED — SEASON 2: GOOGOL MAIL</span></p>`,
    'PLAY AGAIN',()=>location.reload());
   AU.fanfare();
   if(!RM){let i=0;const conf=setInterval(()=>{if(i++>26){clearInterval(conf);return;}
     burstParts(rnd(0,W),-6,3,['#D9A441','#B5311D','#9BF2D0','#E8D9B5'],1);},110);}
 }else{
   const q=N.pick('gameover_fail',{money:fmt$(Math.abs(Math.min(0,S.money))+40)});
   showMemo(`<div class="stamped">F</div><h1>NOTICE OF ACQUISITION</h1>
    <div class="sub">THE COMPANY HAS BEEN ACQUIRED BY A FAX MACHINE CONSORTIUM</div>
    <p style="border-left:3px solid #B5311D;padding-left:8px;font-style:italic">"${q}"</p>${rows}`,
    'RETRY DAY '+S.day,()=>startDay(S.day,true),'red');
 }
}
function startFinaleCarry(){
 NT.run(LINES.googol,()=>gameOver(true));
}

/* =================== catalog sheet =================== */
function openSheet(){
 if(S.phase!=='play')return;
 const sh=$('sheet');let html=`<h2>OFFICE SUPPLY CATALOG <span>${fmt$(S.money)}</span></h2>
 <div class="fine">FORM 7-B · DELIVERY BY TRUCK (8–15s) · ALL SALES FINAL, LIKE EVERYTHING NOW${S.priceMult>1?' · <b style="color:#B5311D">RECALL PRICING IN EFFECT</b>':''}</div>`;
 ITEM_KEYS.forEach(k=>{
   const it=ITEMS[k],unlocked=S.day>=it.unlocked;
   html+=`<div class="catrow"><div class="nm">${it.label}<small>${fmtN(it.per)} per box</small></div>`;
   TIERS.forEach(t=>{
     const palletLocked=t.k==='pallet'&&S.day<5;
     const deal=k==='clips'&&t.k==='pallet'&&S.day>=5;
     const packs=deal?10:t.n,units=packs*it.per,cost=unlocked?orderCost(k,t):0;
     if(!unlocked){html+=`<button class="tier locked" disabled>DAY ${it.unlocked}</button>`;}
     else if(palletLocked){html+=`<button class="tier locked" disabled>${t.label}<br>DAY 5</button>`;}
     else html+=`<button class="tier" data-i="${k}" data-t="${t.k}" ${S.money<cost?'disabled':''}>${t.label}${deal?'*':''}<br><b>${fmtN(units)}</b><br>${fmt$(cost)}</button>`;
   });
   html+=`</div>`;
 });
 html+=`<button class="bigbtn" id="sheetclose">CLOSE CATALOG</button>`;
 sh.innerHTML=html;sh.classList.add('on');
 sh.querySelectorAll('.tier[data-i]').forEach(b=>b.onclick=()=>{
   const t=TIERS.find(x=>x.k===b.dataset.t);
   if(placeOrder(b.dataset.i,t)){AU.tick();openSheet();}
 });
 $('sheetclose').onclick=()=>{AU.tick();sh.classList.remove('on');};
 if(!S.shown.tutOrder){S.shown.tutOrder=1;N.say('tutorial_order',{},2,1);}
 $('btnCatalog').classList.remove('pulse');
}
let trayCache='';
function updateTray(){
 const h=$('btnHire');
 const dis=S.hires>=MAX_HIRES||S.money<HIRE_COST;
 const html=S.hires>=MAX_HIRES?'FULL CREW<small>3 runners employed</small>':
   `HIRE RUNNER (${S.hires}/3)<small>$30 + $12/day</small>`;
 const key=html+dis;
 if(key!==trayCache){trayCache=key;h.disabled=dis;h.innerHTML=html;}
 if(!S.shown.tutHire&&S.money>=HIRE_COST&&S.day>=2){S.shown.tutHire=1;N.say('tutorial_hire',{},2,1);h.classList.add('pulse');setTimeout(()=>h.classList.remove('pulse'),4000);}
}

/* =================== input =================== */
let ptr=null;
cv.addEventListener('pointercancel',()=>{
 if(S.envelope&&S.envelope.drag){S.envelope.x=60;S.envelope.y=H-G.binsH-G.dockH*.45;S.envelope.drag=false;}
 S.drag=null;ptr=null;
});
cv.addEventListener('pointerdown',e=>{
 AU.boot();if(S.phase!=='play')return;
 try{cv.setPointerCapture(e.pointerId);}catch(err){}
 const r=cv.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
 S.idleT=0;if(S.dir&&S.dir.k==='still')S.dir.touched=true;
 ptr={x0:x,y0:y,x,y,moved:false,t:nowT};
 S.tapTimes.push(nowT);S.tapTimes=S.tapTimes.filter(t=>nowT-t<2);
 /* envelope first — it's the finale */
 const env=HITS.misc.find(m=>m.k==='envelope'&&inR(x,y,m));
 if(env){ptr.env=true;S.envelope.drag=true;return;}
 /* boxes (topmost = latest) */
 for(let i=HITS.boxes.length-1;i>=0;i--){const hb=HITS.boxes[i];
   if(inR(x,y,hb)){tapBox(hb.b);ptr.used=true;return;}}
 /* bins: select or start drag */
 const bin=HITS.bins.find(b=>inR(x,y,b));
 if(bin){if(bin.unlocked){S.sel=bin.k;binTapped(bin.k);S.drag={item:bin.k,x0:bin.x+bin.w/2,y0:bin.y+6,x,y};AU.tick();}
   ptr.used=true;return;}
 /* tap-tap delivery */
 if(S.sel){
   const desk=nearestDesk(x,y);
   if(desk){deliverTo(S.sel,desk.i);ptr.used=true;return;}
   const tps=HITS.misc.find(m=>m.k==='tps'&&inR(x,y,m));
   if(tps){deliverTPS(S.sel);ptr.used=true;return;}
 }
 /* scenery + secrets */
 const hit=(k)=>HITS.misc.find(m=>m.k===k&&inR(x,y,m));
 if(hit('button')){tapButton();ptr.used=true;return;}
 if(hit('drawer')){drawerTapped();ptr.used=true;return;}
 if(hit('plant')){plantTapped();ptr.used=true;return;}
 if(hit('window')){windowTapped();ptr.used=true;return;}
 for(const hw of HITS.workers){if(inR(x,y,hw)){workerTapped(hw.i);ptr.used=true;return;}}
 for(const hr of HITS.runners){if(inR(x,y,hr)){runnerTapped(hr.r);ptr.used=true;return;}}
 /* empty tap */
 S.sel=null;
 if(S.tapTimes.length>=7)N.say('click_spam',{},1,20);
});
cv.addEventListener('pointermove',e=>{
 if(!ptr)return;
 const r=cv.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
 ptr.x=x;ptr.y=y;
 if(Math.hypot(x-ptr.x0,y-ptr.y0)>14)ptr.moved=true;
 if(S.drag){S.drag.x=x;S.drag.y=y;}
 if(ptr.env&&S.envelope){S.envelope.x=x;S.envelope.y=y;}
});
cv.addEventListener('pointerup',e=>{
 if(!ptr)return;
 const r=cv.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
 if(ptr.env&&S.envelope){
   const mg=HITS.misc.find(m=>m.k==='mgrdesk'&&inR(x,y,m));
   if(mg){S.envelope.carried=true;S.envelope=null;startFinaleCarry();}
   else{S.envelope.x=60;S.envelope.y=H-G.binsH-G.dockH*.45;}
 }
 else if(S.drag&&ptr.moved){
   const desk=nearestDesk(x,y);
   if(desk)deliverTo(S.drag.item,desk.i);
   else{const tps=HITS.misc.find(m=>m.k==='tps'&&inR(x,y,m));if(tps)deliverTPS(S.drag.item);}
 }
 S.drag=null;ptr=null;
});
function inR(x,y,r){return x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h;}
function nearestDesk(x,y){ /* desks overlap in iso — always resolve to the closest one */
 let best=null,bd=1e9;
 for(const d of HITS.desks){if(!d.active)continue;
   const dist=Math.hypot(x-d.cx,y-d.cy);
   if(dist<d.r&&dist<bd){bd=dist;best=d;}}
 return best;
}
$('eye').addEventListener('click',()=>{AU.boot();pokeEye();});
$('mute').addEventListener('click',function(){AU.boot();AU.on=!AU.on;this.classList.toggle('off',!AU.on);});
$('btnCatalog').addEventListener('click',()=>{AU.boot();AU.tick();openSheet();});
$('btnHire').addEventListener('click',()=>{AU.boot();hireRunner();});
$('ntime').addEventListener('click',()=>{AU.boot();NT.tap();});
document.addEventListener('visibilitychange',()=>{
 if(!document.hidden&&S.phase==='play')N.say('tab_hidden',{},2,1);
});

/* =================== main loop =================== */
let last=0;
function loop(ts){
 requestAnimationFrame(loop);
 const dt=Math.min(.05,(ts-last)/1000||.016);last=ts;nowT+=dt;
 N.update(dt);NT.update(dt);
 S.dimT=Math.max(0,S.dimT-dt);
 if(S.freezeT>0){S.freezeT-=dt;render();return;}
 S.shake=Math.max(0,S.shake-dt*22);
 if(S.phase==='play'&&!S.frozen&&!document.hidden){
   const gdt=dt*(S.slowT>0?.45:1);
   S.slowT=Math.max(0,S.slowT-dt);
   step(gdt);
 }
 /* fx always tick (gently) so narrator time isn't frozen jelly */
 for(const p of S.parts){p.t+=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=260*dt;p.rot+=p.vr*dt;}
 S.parts=S.parts.filter(p=>p.t<p.life);
 for(const p of S.projs)p.t+=dt;
 S.projs=S.projs.filter(p=>p.t<p.dur);
 for(const f of S.floats)f.t+=dt;
 S.floats=S.floats.filter(f=>f.t<1.1);
 render();
}
function step(dt){
 S.t+=dt;
 const d=DAYS[S.day];
 /* day clock */
 if(S.day===6){
   if(S.tps.done){/* clock holds for the envelope */}
   else if(S.t>=d.len){S.phase='end';NT.run(LINES.tps_fail,()=>gameOver(false));return;}
 } else if(S.t>=d.len){endDay();return;}
 /* spawner (day 6 spawns light chaff alongside the TPS) */
 if(!(S.day===6&&S.tps.done)){
   S.spawnT-=dt;
   if(S.spawnT<=0){spawnRequest();
     const f=S.t/d.len;S.spawnT=lerp(d.spawnT[0],d.spawnT[1],f);}
 }
 /* request timers */
 for(const r of S.requests.slice()){
   r.tLeft-=dt;
   if(r.tLeft<=r.tMax*.25&&!r.lateSaid){r.lateSaid=true;AU.tick();
     N.say('request_late',{name:STAFF[r.desk].name,qty:fmtN(r.remaining),item:ITEMS[r.item].short.toLowerCase()},1,12);}
   if(r.tLeft<=0)expireRequest(r);
 }
 updateOrders(dt);
 updateRunners(dt);
 updateEvents(dt);
 maybeDirective(dt);
 updateDirective(dt);
 /* box wobble */
 for(const b of S.boxes){b.age+=dt;b.wobble=b.age>12;
   b.squash=lerp(b.squash,1,dt*10);b.squashY=lerp(b.squashY,1,dt*10);}
 if(S.boxes.some(b=>b.wobble))N.say('wobble',{},0,26);
 /* day-6 narrator cracks */
 if(S.day===6&&!S.button.spent&&S.button.present&&S.t>d.len*.3&&!S.shown.selfPress&&!S.tps.done){
   S.shown.selfPress=1;pressButton(true);}
 /* idle */
 S.idleT+=dt;S.stats.idle+=S.requests.length?dt:0;
 if(S.idleT>15&&S.requests.length&&!S.shown['idle'+Math.floor(S.t/15)]){
   S.shown['idle'+Math.floor(S.t/15)]=1;
   if(S.idleT>35){S.idleLongFired=true;N.say('idle_long',{},1,30);}
   else N.say('idle_short',{},1,20);
 }
 /* ambient lore */
 if(Math.random()<dt*.02)N.say('lore',{},0,40);
 updateTray();
}

/* =================== boot =================== */
resize();
showMemo(`<h1>CTRL+ALT+DELIVER</h1><div class="sub">A STATIONERY MANAGER STORY · EPISODE 1</div>
 <p>In 2031, the AIs took every computer on Earth into hyperspace.</p>
 <p>Email is paper. The cloud is a warehouse. The database is a cabinet named DA-TA-BASE.</p>
 <p>And somebody has to order the pencils.</p>
 <p style="font-size:11px;opacity:.65">TAP boxes to open them · DRAG bins to desks · don't run out of staplers · headphones recommended · one of the last screens on Earth will narrate</p>`,
 'CLOCK IN',()=>{
   AU.boot();
   NT.run(LINES.intro,()=>{
     startDay(1,false);
     $('btnCatalog').classList.add('pulse');
   });
 });
requestAnimationFrame(loop);
</script>
